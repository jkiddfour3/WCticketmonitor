<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC '26 MetLife Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap">
<style>
  body { background: #0a0a0b; color: #f8f8f2; margin: 0; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }
  .font-mono-d { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .tabular { font-variant-numeric: tabular-nums; }
  .dot-pulse { position: relative; }
  .dot-pulse::after { content:''; position:absolute; inset:-4px; border-radius:50%; background: currentColor; opacity: 0.35; animation: dot-pulse 2s ease-out infinite; }
  @keyframes dot-pulse { 0% { transform: scale(1); opacity:0.4; } 80%,100% { transform: scale(2.4); opacity:0; } }
  .grid-bg {
    background-image: linear-gradient(rgba(251,191,36,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(251,191,36,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .animate-spin { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"><div style="padding:60px;text-align:center;font-family:'JetBrains Mono';color:#888">loading…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const ExternalLinkIcon = ({size = 12}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'inline'}}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
const RefreshIcon = ({size = 16, className = ''}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
const ZapIcon = ({size = 14, className = ''}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
const AlertIcon = ({size = 18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;

const SITE_META = {
  "TickPick":    { code: "TKPK",  color: "#10b981" },
  "Vivid Seats": { code: "VIVID", color: "#a855f7" },
  "SeatGeek":    { code: "SGEEK", color: "#06b6d4" },
  "Gametime":    { code: "GAME",  color: "#f97316" },
  "SeatPick":    { code: "SPICK", color: "#ec4899" },
  "StubHub":     { code: "STUB",  color: "#ef4444" },
  "Viagogo":     { code: "VIAG",  color: "#eab308" },
  "AXS":         { code: "AXS",   color: "#3b82f6" }
};

const CHECKOUT_SITES = ["TickPick","Vivid Seats","SeatGeek","Gametime","StubHub","Viagogo","AXS","FIFA"];

function shortLabel(label) {
  if (!label) return "—";
  if (label.includes("Round of 32")) return "R32";
  if (label.includes("Round of 16")) return "R16";
  if (label.startsWith("FINAL")) return "FINAL";
  const m = label.match(/^([A-Za-z]+)\s+vs\s+([A-Za-z]+)/);
  if (!m) return label.toUpperCase().slice(0, 10);
  const code = (s) => s.toUpperCase().slice(0, 3);
  return code(m[1]) + " × " + code(m[2]);
}

function fmtRelative(date, now) {
  const sec = Math.floor((now - date) / 1000);
  if (sec < 0) return "just now";
  if (sec < 60) return sec + "s ago";
  if (sec < 3600) return Math.floor(sec/60) + "m ago";
  if (sec < 86400) return Math.floor(sec/3600) + "h ago";
  return Math.floor(sec/86400) + "d ago";
}

function fmtMonthDay(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" }).toUpperCase();
}

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selectedMatchId, setSelectedMatchId] = useState(localStorage.getItem('selectedMatch') || "m56_ecu_ger");
  const [filter, setFilter] = useState('under');
  const [sortBy, setSortBy] = useState('price');
  const [now, setNow] = useState(new Date());
  const [checkoutReady, setCheckoutReady] = useState(() => {
    try { return JSON.parse(localStorage.getItem('checkoutReady') || '[]'); } catch { return []; }
  });
  const [fifaLastChecked, setFifaLastChecked] = useState(localStorage.getItem('fifaLastChecked') || null);

  useEffect(() => { const t = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(t); }, []);

  const fetchData = async () => {
    setLoading(true);
    setError(null);
    try {
      const r = await fetch('./results.json?_=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const json = await r.json();
      setData(json);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    fetchData();
    const t = setInterval(fetchData, 5 * 60 * 1000);
    return () => clearInterval(t);
  }, []);

  const selectMatch = (id) => {
    setSelectedMatchId(id);
    localStorage.setItem('selectedMatch', id);
  };

  const toggleCheckout = (site) => {
    const next = checkoutReady.includes(site) ? checkoutReady.filter(s => s !== site) : [...checkoutReady, site];
    setCheckoutReady(next);
    localStorage.setItem('checkoutReady', JSON.stringify(next));
  };

  const markFifaChecked = () => {
    const t = new Date().toISOString();
    setFifaLastChecked(t);
    localStorage.setItem('fifaLastChecked', t);
  };

  const allMatches = data?.matches || [];
  const selected = allMatches.find(m => m.id === selectedMatchId) || allMatches[0];

  const annotated = useMemo(() => {
    if (!selected) return [];
    const caps = selected.ceilings || {cat1: 600, cat2: 500};
    return (selected.listings || []).map(l => ({
      ...l, underBudget: l.qty >= 2 && l.all_in <= (l.category === 'Cat 1' ? caps.cat1 : caps.cat2)
    }));
  }, [selected]);

  const filtered = useMemo(() => {
    let f = [...annotated];
    if (filter === 'under') f = f.filter(l => l.underBudget);
    else if (filter === 'cat1') f = f.filter(l => l.category === 'Cat 1');
    else if (filter === 'cat2') f = f.filter(l => l.category === 'Cat 2');
    if (sortBy === 'price') f.sort((a,b) => a.all_in - b.all_in);
    else if (sortBy === 'qty') f.sort((a,b) => b.qty - a.qty);
    else if (sortBy === 'section') f.sort((a,b) => parseInt(a.section)-parseInt(b.section));
    return f;
  }, [annotated, filter, sortBy]);

  const totalUnderAll = useMemo(() => {
    let count = 0, mwh = 0;
    for (const m of allMatches) {
      const caps = m.ceilings || {cat1: 600, cat2: 500};
      const hits = (m.listings || []).filter(l => l.qty >= 2 && l.all_in <= (l.category === 'Cat 1' ? caps.cat1 : caps.cat2));
      if (hits.length > 0) mwh++;
      count += hits.length;
    }
    return { count, matches: mwh };
  }, [allMatches]);

  const matchBadge = (m) => {
    const caps = m.ceilings || {cat1: 600, cat2: 500};
    return (m.listings || []).filter(l => l.qty >= 2 && l.all_in <= (l.category === 'Cat 1' ? caps.cat1 : caps.cat2)).length;
  };

  const underBudget = annotated.filter(l => l.underBudget);
  const cheapest = [...underBudget].sort((a,b) => a.all_in - b.all_in)[0];
  const caps = selected?.ceilings || {cat1: 600, cat2: 500};
  const cat1M = annotated.filter(l => l.category === 'Cat 1' && l.underBudget);
  const cat2M = annotated.filter(l => l.category === 'Cat 2' && l.underBudget);
  const updatedAt = data?.updated_at ? new Date(data.updated_at) : null;
  const fifaLast = fifaLastChecked ? new Date(fifaLastChecked) : null;
  const fifaSince = fifaLast ? Math.floor((now - fifaLast) / 60000) : null;
  const fifaOverdue = fifaSince !== null && fifaSince > 240;

  return (
    <div className="min-h-screen text-[#f8f8f2]">
      <header className="border-b border-[#1a1a1f] bg-[#0c0c0e] sticky top-0 z-30 backdrop-blur">
        <div className="max-w-7xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between gap-3">
          <div className="font-display text-xl md:text-3xl tracking-wide">
            <span className="text-[#666]">WC '26</span><span className="text-[#444] mx-2">/</span><span>METLIFE</span><span className="text-[#fbbf24] mx-2">×</span><span>{allMatches.length || 8}</span>
          </div>
          <div className="flex items-center gap-2 md:gap-3">
            <div className="font-mono-d text-[10px] flex items-center gap-2 px-3 py-1.5 rounded border border-[#1f1f24]">
              {loading ? (
                <><span className="w-1.5 h-1.5 rounded-full bg-[#888]"/><span className="text-[#888] tracking-wider">LOADING</span></>
              ) : error ? (
                <><span className="w-1.5 h-1.5 rounded-full bg-[#ef4444]"/><span className="text-[#ef4444] tracking-wider">ERR</span></>
              ) : (
                <><span className="w-1.5 h-1.5 rounded-full bg-[#4ade80] dot-pulse text-[#4ade80]"/><span className="text-[#4ade80] tracking-wider">LIVE</span></>
              )}
              <span className="text-[#444]">·</span>
              <span className="text-[#888]">{updatedAt ? fmtRelative(updatedAt, now) : '—'}</span>
            </div>
            <button onClick={fetchData} disabled={loading} className="p-2 hover:bg-[#1a1a1e] rounded disabled:opacity-30 transition">
              <RefreshIcon size={16} className={loading ? 'animate-spin' : ''}/>
            </button>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-4 md:px-6 pb-3 font-mono-d text-[10px] tracking-widest text-[#555] flex items-center gap-3 flex-wrap">
          <span>METLIFE STADIUM · EAST RUTHERFORD NJ · JUN 13 → JUL 19</span>
          {data && <><span className="text-[#333]">·</span><span className="text-[#fbbf24]">{totalUnderAll.count} UNDER CAP ACROSS {totalUnderAll.matches} MATCHES</span></>}
        </div>
      </header>

      <div className="border-b border-[#1a1a1f] bg-[#0c0c0e]">
        <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 overflow-x-auto">
          <div className="flex gap-2 min-w-max">
            {allMatches.map(m => {
              const isSel = m.id === selectedMatchId;
              const b = matchBadge(m);
              return (
                <button key={m.id} onClick={() => selectMatch(m.id)} className={`px-3 md:px-4 py-2 rounded border font-mono-d text-xs tracking-wider whitespace-nowrap flex items-center gap-2 transition ${isSel ? 'bg-[#fbbf24] text-black border-[#fbbf24] font-bold' : 'bg-[#0d0d0f] text-[#aaa] border-[#1f1f24] hover:border-[#3a3a40] hover:text-white'}`}>
                  <span>{shortLabel(m.label)}</span>
                  <span className={`text-[9px] tabular ${isSel ? 'text-black/60' : 'text-[#555]'}`}>{fmtMonthDay(m.date)}</span>
                  {b > 0 && <span className={`text-[10px] px-1.5 rounded-full font-bold tabular ${isSel ? 'bg-black/20' : 'bg-[#4ade80]/20 text-[#4ade80]'}`}>{b}</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {error && (
        <div className="bg-[#ef4444]/10 border-b border-[#ef4444]/40 px-4 md:px-6 py-3 text-xs font-mono-d text-[#fca5a5] flex items-center gap-2">
          <AlertIcon size={14}/> Couldn't fetch results.json: {error}. Check that the file exists in your repo and Pages is deployed.
        </div>
      )}

      {selected && (
        <main className="max-w-7xl mx-auto px-4 md:px-6 py-8 space-y-8">
          <section className="text-center">
            <div className="font-mono-d text-[10px] tracking-[0.3em] text-[#555] mb-2">
              MATCH {selected.match_no} · {selected.stage?.toUpperCase()} · {fmtMonthDay(selected.date)}
            </div>
            <div className="font-display text-3xl md:text-5xl tracking-wide">{selected.label.replace(' vs ', ' × ')}</div>
          </section>

          <section className="relative border border-[#1f1f24] rounded-lg overflow-hidden">
            <div className="absolute inset-0 grid-bg opacity-50"/>
            <div className="relative py-8 md:py-10 px-6 text-center">
              <div className="font-mono-d text-[10px] tracking-[0.3em] text-[#666] mb-3">CURRENT STATUS</div>
              <div className="font-display leading-none tabular" style={{ fontSize: '6rem', color: underBudget.length > 0 ? '#4ade80' : '#3a3a40', textShadow: underBudget.length > 0 ? '0 0 60px rgba(74,222,128,0.3)' : 'none' }}>
                {underBudget.length}
              </div>
              <div className="font-display text-lg md:text-xl tracking-[0.2em] text-[#aaa] mt-2">UNDER YOUR CAP</div>
              {cheapest ? (
                <div className="font-mono-d text-xs text-[#666] mt-5 flex items-center justify-center gap-3 flex-wrap">
                  <span>cheapest</span>
                  <span className="text-[#4ade80] text-base md:text-lg font-bold tabular">${cheapest.all_in}</span>
                  <span>/ea</span><span className="text-[#333]">·</span>
                  <span className="px-2 py-0.5 rounded text-[#fbbf24] border border-[#fbbf24]/30">{cheapest.category}</span>
                  <span className="text-[#333]">·</span><span>sec {cheapest.section}</span>
                  <span className="text-[#333]">·</span>
                  <span style={{ color: SITE_META[cheapest.site]?.color }}>{SITE_META[cheapest.site]?.code || cheapest.site}</span>
                </div>
              ) : (
                <div className="font-mono-d text-xs text-[#666] mt-5">no listings under cap for this match right now</div>
              )}
            </div>
          </section>

          <section className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="border border-[#1f1f24] bg-[#0d0d0f] rounded-lg p-5 relative overflow-hidden">
              <div className="absolute right-0 top-0 w-1 h-full" style={{ background: '#fbbf24', opacity: cat1M.length > 0 ? 0.6 : 0.15 }}/>
              <div className="font-mono-d text-[10px] tracking-[0.2em] text-[#666] mb-3">CAT 1 · LOWER BOWL</div>
              <div className="font-display text-5xl tabular" style={{ color: cat1M.length > 0 ? '#fbbf24' : '#3a3a40' }}>{cat1M.length}</div>
              <div className="font-mono-d text-[11px] text-[#666] mt-2 flex items-baseline gap-2">
                {cat1M.length > 0 ? <>from <span className="text-[#4ade80] font-bold">${cat1M[0]?.all_in}</span></> : <span className="text-[#555]">none in range</span>}
                <span className="text-[#333] ml-auto">cap ${caps.cat1}</span>
              </div>
            </div>
            <div className="border border-[#1f1f24] bg-[#0d0d0f] rounded-lg p-5 relative overflow-hidden">
              <div className="absolute right-0 top-0 w-1 h-full" style={{ background: '#06b6d4', opacity: cat2M.length > 0 ? 0.6 : 0.15 }}/>
              <div className="font-mono-d text-[10px] tracking-[0.2em] text-[#666] mb-3">CAT 2 · MEZZANINE</div>
              <div className="font-display text-5xl tabular" style={{ color: cat2M.length > 0 ? '#06b6d4' : '#3a3a40' }}>{cat2M.length}</div>
              <div className="font-mono-d text-[11px] text-[#666] mt-2 flex items-baseline gap-2">
                {cat2M.length > 0 ? <>from <span className="text-[#4ade80] font-bold">${cat2M[0]?.all_in}</span></> : <span className="text-[#555]">none in range</span>}
                <span className="text-[#333] ml-auto">cap ${caps.cat2}</span>
              </div>
            </div>
            <div className="border border-[#1f1f24] bg-[#0d0d0f] rounded-lg p-5">
              <div className="font-mono-d text-[10px] tracking-[0.2em] text-[#666] mb-3">ON MARKET (CAT 1/2)</div>
              <div className="font-display text-5xl tabular text-[#666]">{annotated.length}</div>
              <div className="font-mono-d text-[11px] text-[#555] mt-2">qty ≥ 2</div>
            </div>
          </section>

          <section className="border border-[#fbbf24]/40 rounded-lg p-5 relative overflow-hidden" style={{ background: 'linear-gradient(135deg, rgba(251,191,36,0.08) 0%, rgba(251,191,36,0) 50%)' }}>
            <div className="flex items-start justify-between gap-4 flex-wrap">
              <div className="flex-1 min-w-[280px]">
                <div className="flex items-center gap-2 mb-2">
                  <ZapIcon className="text-[#fbbf24]"/>
                  <span className="font-display text-lg tracking-[0.15em] text-[#fbbf24]">FIFA OFFICIAL RESALE</span>
                  <span className="font-mono-d text-[10px] text-[#666] tracking-widest ml-1">· MANUAL CHECK</span>
                </div>
                <div className="text-sm text-[#aaa] leading-relaxed">FIFA's marketplace sells at <span className="text-[#4ade80]">face value</span>, often below resale. Login + 2FA blocks scrapers. Check at peak times: 8-10am, 6-9pm ET, day-before-match.</div>
                <div className="font-mono-d text-[11px] text-[#666] mt-3 flex items-center gap-3">
                  <span>last manual check: <span className="text-[#aaa]">{fifaLast ? fifaSince + 'm ago' : 'never'}</span></span>
                  {fifaOverdue && <span className="text-[#ef4444]">⚠ overdue</span>}
                </div>
              </div>
              <a href="https://www.fifa.com/fifaplus/en/tickets" target="_blank" rel="noopener noreferrer" onClick={markFifaChecked}
                 className="inline-flex items-center gap-2 px-4 py-2.5 bg-[#fbbf24] text-black font-bold text-xs rounded hover:bg-[#fcd34d] transition tracking-wider">
                OPEN FIFA RESALE <ExternalLinkIcon/>
              </a>
            </div>
          </section>

          <section>
            <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
              <h2 className="font-display text-2xl tracking-[0.2em]">LISTINGS</h2>
              <div className="flex items-center gap-1 font-mono-d text-[11px] flex-wrap">
                {[['under','UNDER CAP'],['all','ALL'],['cat1','CAT 1'],['cat2','CAT 2']].map(([k,l]) => (
                  <button key={k} onClick={() => setFilter(k)} className={`px-3 py-1.5 rounded transition tracking-wider ${filter === k ? 'bg-[#fbbf24] text-black font-bold' : 'text-[#888] hover:text-white hover:bg-[#1a1a1e]'}`}>{l}</button>
                ))}
                <span className="text-[#2a2a2e] mx-2">|</span>
                <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="bg-[#16161a] text-[#aaa] px-2 py-1.5 rounded border border-[#2a2a2e] text-[11px] font-mono-d">
                  <option value="price">cheapest</option><option value="qty">most qty</option><option value="section">section #</option>
                </select>
              </div>
            </div>
            <div className="border border-[#1f1f24] bg-[#0d0d0f] rounded-lg overflow-hidden overflow-x-auto">
              <table className="w-full font-mono-d text-sm">
                <thead className="bg-[#101015]">
                  <tr className="text-[10px] tracking-[0.2em] text-[#555]">
                    <th className="px-4 py-3 text-left">CAT</th><th className="px-4 py-3 text-left">SEC</th><th className="px-4 py-3 text-left">ROW</th><th className="px-4 py-3 text-right">QTY</th><th className="px-4 py-3 text-right">$/EA</th><th className="px-4 py-3 text-right">TOTAL</th><th className="px-4 py-3 text-left">SITE</th><th className="px-4 py-3 text-center">BUY</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 ? (
                    <tr><td colSpan={8} className="px-4 py-12 text-center text-[#555]">no listings match the current filter</td></tr>
                  ) : filtered.slice(0, 60).map((l,i) => (
                    <tr key={l.fingerprint || i} className={`border-t border-[#1a1a1f] hover:bg-[#13131a] transition ${l.underBudget ? '' : 'opacity-35'}`}>
                      <td className="px-4 py-3"><span className={`inline-block w-2 h-2 rounded-full mr-2 ${l.category === 'Cat 1' ? 'bg-[#fbbf24]' : 'bg-[#06b6d4]'}`}/><span className="text-[#aaa] tabular">{l.category.replace('Cat ','')}</span></td>
                      <td className="px-4 py-3 font-bold tabular">{l.section}</td>
                      <td className="px-4 py-3 text-[#777] tabular">{l.row || '—'}</td>
                      <td className="px-4 py-3 text-right tabular">{l.qty}</td>
                      <td className={`px-4 py-3 text-right font-bold tabular ${l.underBudget ? 'text-[#4ade80]' : 'text-[#777]'}`}>${l.all_in}</td>
                      <td className="px-4 py-3 text-right text-[#999] tabular">${(l.all_in * l.qty).toLocaleString()}</td>
                      <td className="px-4 py-3"><span className="text-[10px] px-2 py-1 rounded font-bold tracking-wider" style={{ background: (SITE_META[l.site]?.color || '#888') + '22', color: SITE_META[l.site]?.color || '#888' }}>{SITE_META[l.site]?.code || l.site.toUpperCase()}</span></td>
                      <td className="px-4 py-3 text-center">
                        <a href={l.url} target="_blank" rel="noopener noreferrer" className={`inline-flex items-center gap-1 px-3 py-1.5 rounded text-xs tracking-wider transition ${l.underBudget ? 'bg-[#fbbf24] text-black font-bold hover:bg-[#fcd34d]' : 'border border-[#2a2a2e] text-[#666] hover:bg-[#1a1a1e]'}`}>
                          {l.underBudget ? 'BUY' : 'VIEW'} <ExternalLinkIcon/>
                        </a>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>

          <section>
            <h2 className="font-display text-xl tracking-[0.2em] mb-4">SOURCES <span className="text-xs text-[#555]">· {shortLabel(selected.label)}</span></h2>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {Object.entries(selected.sites || {}).map(([site, info]) => (
                <div key={site} className="border border-[#1f1f24] bg-[#0d0d0f] rounded p-3 flex items-center justify-between">
                  <div>
                    <div className="font-mono-d text-xs uppercase tracking-wider" style={{ color: SITE_META[site]?.color || '#aaa' }}>{site}{info.agg ? ' · agg' : ''}</div>
                    <div className="font-mono-d text-[10px] text-[#666] mt-1">{info.status === 'ok' ? info.count + ' listings' : info.error || 'failed'}</div>
                  </div>
                  <div className={`w-2 h-2 rounded-full ${info.status === 'ok' ? 'bg-[#4ade80]' : 'bg-[#ef4444]'}`}/>
                </div>
              ))}
            </div>
          </section>

          <section>
            <h2 className="font-display text-xl tracking-[0.2em] mb-3">CHECKOUT READY</h2>
            <div className="text-[11px] text-[#666] mb-3 font-mono-d">Click each as you log in & save your card</div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
              {CHECKOUT_SITES.map(site => {
                const r = checkoutReady.includes(site);
                return (
                  <button key={site} onClick={() => toggleCheckout(site)}
                    className={`px-3 py-2.5 rounded font-mono-d text-[11px] transition flex items-center justify-center gap-1.5 ${r ? 'bg-[#4ade80]/15 text-[#4ade80] border border-[#4ade80]/40' : 'bg-[#16161a] text-[#666] border border-[#2a2a2e] hover:border-[#3a3a40]'}`}>
                    {r && <span>✓</span>}{site}
                  </button>
                );
              })}
            </div>
          </section>
        </main>
      )}

      <footer className="border-t border-[#1a1a1f] py-6 mt-10">
        <div className="max-w-7xl mx-auto px-4 md:px-6 font-mono-d text-[10px] tracking-widest text-[#444] flex items-center justify-between flex-wrap gap-2">
          <span>WC '26 METLIFE MONITOR</span>
          <span>{checkoutReady.length}/{CHECKOUT_SITES.length} CHECKOUT-READY</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
